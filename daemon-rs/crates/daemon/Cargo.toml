[package]
name = "opensnitchd-rs"
version = "0.6.0"
edition.workspace = true
license.workspace = true

[features]
default = ["native-ebpf-ringbuf", "aya-ebpf"]
native-ebpf-ringbuf = []
libbpf-ebpf = ["dep:libbpf-rs"]
aya-ebpf = ["dep:aya"]
subscriptions = []
metrics-export = ["dep:hyper", "dep:http-body-util", "dep:flate2", "dep:prost"]

[dependencies]
tokio = { version = "1.50", features = ["macros", "rt-multi-thread", "signal", "sync", "time", "process", "net", "io-util", "fs"] }
tokio-stream = "0.1"
tokio-util = "0.7"
tonic = { version = "0.14", features = ["tls-webpki-roots", "gzip"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
syslog = "7.0"
nix = { version = "0.31", features = ["user", "socket"] }
regex = "1.12"
aho-corasick = "1.1"
globset = "0.4"
quick_cache = "0.6"
dashmap = "6.1"
arc-swap = "1.9"
# sha2/sha1/md-5: keep at 0.10 — 0.11.0 (2026-03-25) requires digest 0.11 with breaking API changes
sha2 = "0.10"
sha1 = "0.10"
md-5 = "0.10"
time = { version = "0.3", features = ["formatting", "parsing", "macros", "local-offset"] }

opensnitch-proto = { path = "../proto" }
opensnitch-ebpf-common = { path = "../ebpf-common" }
libbpf-rs = { version = "0.26", optional = true }
aya = { version = "0.13", optional = true }
netlink-bindings = { version = "0.3", features = ["inet-diag", "rt-link", "rt-addr", "nftables"] }
netlink-socket2 = { version = "0.3", features = ["tokio"] }
rustix = { version = "1.1", features = ["net", "event", "thread", "system"] }
reqwest = { version = "0.13", default-features = false, features = ["rustls", "http2"] }
hyper-rustls = { version = "0.27", default-features = true, features = ["http2"] }
hyper-util = { version = "0.1", features = ["tokio"] }
hyper = { version = "1", features = ["http1", "server"], optional = true }
http-body-util = { version = "0.1", optional = true }
flate2 = { version = "1", optional = true }
prost = { version = "0.14", optional = true }
rustls = "0.23"
rustls-pki-types = "1.14"
tower = { version = "0.5", features = ["util"] }
opensnitch-kernel-caps = { path = "../kernel-caps" }

[dev-dependencies]
# async-trait is needed only to implement the tonic-generated `Ui` server trait in
# flow tests; tonic-prost still desugars server traits via #[async_trait].
async-trait = "0.1"
ctor = "0.6"
