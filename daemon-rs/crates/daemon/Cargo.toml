[package]
name = "opensnitchd-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
tokio-stream = "0.1.18"
tokio-util = "0.7.18"
tonic = "0.14.5"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
crossbeam-channel = "0.5.15"
nix = "0.31.2"
regex = "1.12.2"
time = { version = "0.3.44", features = ["formatting", "parsing"] }

opensnitch-proto = { path = "../proto" }
