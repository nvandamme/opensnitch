[package]
name = "opensnitchd-rs"
version = "0.1.0"
edition = "2024"

[features]
default = ["native-ebpf-ringbuf"]
native-ebpf-ringbuf = ["dep:libbpf-rs"]
aya-ebpf = []
integration-kernel-tests = []

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
tokio-stream = "0.1.18"
tokio-util = "0.7.18"
tonic = "0.14.5"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
crossbeam-channel = "0.5.15"
nix = "0.31.2"
regex = "1.12.2"
sha2 = "0.10.9"
time = { version = "0.3.47", features = ["formatting", "parsing"] }

opensnitch-proto = { path = "../proto" }
libbpf-rs = { version = "0.26.1", optional = true }
rtnetlink = "0.20.0"
audit = "0.7.3"
netlink-packet-sock-diag = "0.4.2"
netlink-packet-core = "0.7.0"
netlink-sys = "0.8.8"
rustix = { version = "1.1.2", features = ["net", "event", "thread", "system"] }
reqwest = { version = "0.12.23", default-features = false, features = ["rustls-tls"] }
