[package]
name = "opensnitchd-rs"
version = "0.3.0"
edition = "2024"

[features]
default = ["native-ebpf-ringbuf", "aya-ebpf", "libbpf-ebpf", "netlink-bindings-socket-diag"]
native-ebpf-ringbuf = []
libbpf-ebpf = ["dep:libbpf-rs"]
aya-ebpf = ["dep:aya"]
netlink-bindings-socket-diag = ["dep:netlink-bindings", "dep:netlink-socket2"]

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
tokio-stream = "0.1.18"
tokio-util = "0.7.18"
tonic = { version = "0.14.5", features = ["tls-webpki-roots", "gzip"] }
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
nix = { version = "0.31.2", features = ["user", "socket"] }
regex = "1.12.2"
aho-corasick = "1.1.3"
globset = "0.4.15"
lru = "0.16.3"
sha2 = "0.10.9"
sha1 = "0.10.6"
md-5 = "0.10.6"
time = { version = "0.3.47", features = ["formatting", "parsing", "macros", "local-offset"] }

opensnitch-proto = { path = "../proto" }
opensnitch-ebpf-common = { path = "../ebpf-common" }
libbpf-rs = { version = "0.26.1", optional = true }
aya = { version = "0.13.1", optional = true }
netlink-bindings = { version = "0.3.0", optional = true, features = ["inet-diag", "rt-link", "rt-addr"] }
netlink-socket2 = { version = "0.3.0", optional = true, features = ["tokio"] }
rustix = { version = "1.1.2", features = ["net", "event", "thread", "system"] }
reqwest = { version = "0.13.2", default-features = true }
hyper-rustls = { version = "0.27.7", default-features = true, features = ["http2"] }
hyper-util = { version = "0.1.17", features = ["tokio"] }
rustls = "0.23.37"
rustls-pki-types = "1.14.0"
tower = { version = "0.5.2", features = ["util"] }

[dev-dependencies]
ctor = "0.6.3"
