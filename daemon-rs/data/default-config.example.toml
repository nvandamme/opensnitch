DefaultAction = "allow"
DefaultDuration = "once"
AskTimeoutPolicy = "default"
InterceptUnknown = false
ProcMonitorMethod = "ebpf"
LogLevel = 2
LogUTC = true
LogMicro = false
Firewall = "nftables"

[Server]
Address = "unix:///tmp/osui.sock"
LogFile = "/var/log/opensnitchd.log"
Loggers = []

[Server.Authentication]
Type = "simple"

[Server.Authentication.TLSOptions]
CACert = ""
ServerCert = ""
ServerKey = ""
ClientCert = ""
ClientKey = ""
SkipVerify = false
ClientAuthType = "no-client-cert"

[FwOptions]
ConfigPath = "/etc/opensnitchd/system-fw.json"
MonitorInterval = "10s"
QueueNum = 0
QueueBypass = true

[Rules]
Path = "/etc/opensnitchd/rules/"
EnableChecksums = false

[Ebpf]
ModulesPath = "/usr/lib/opensnitchd/ebpf"
EventsWorkers = 8
QueueEventsSize = 0

[Audit]
AudispSocketPath = "/var/run/audispd_events"

[Stats]
MaxEvents = 250
MaxStats = 25
Workers = 6

[Tasks]
ConfigPath = "/etc/opensnitchd/tasks/tasks.json"

[Internal]
GCPercent = 100
FlushConnsOnStart = true
